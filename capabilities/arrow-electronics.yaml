naftiko: 1.0.0-alpha2
info:
  label: Arrow Electronics ItemService API
  description: 'Arrow Electronics ItemService API. 7 operations. Lead operation: Manufacturer lookup. Self-contained Naftiko
    capability covering one Arrow Electronics business surface.'
  tags:
  - Arrow Electronics
  - Arrow Electronics ItemService API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ARROW_ELECTRONICS_API_KEY: ARROW_ELECTRONICS_API_KEY
capability:
  consumes:
  - type: http
    namespace: arrow-electronics
    baseUri: https://api.arrow.com/itemservice/v4
    description: Arrow Electronics ItemService API business capability. Self-contained, no shared references.
    resources:
    - name: en-lookup-manufacturer
      path: /en/lookup/manufacturer
      operations:
      - name: lookupmanufacturer
        method: GET
        description: Manufacturer lookup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: lookupmanufacturerpost
        method: POST
        description: Manufacturer lookup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: en-lookup-taxonomy
      path: /en/lookup/taxonomy
      operations:
      - name: lookuptaxonomy
        method: GET
        description: Taxonomy lookup (deprecated)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: en-search-list
      path: /en/search/list
      operations:
      - name: searchlist
        method: GET
        description: Search for multiple items at once
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: searchlistpost
        method: POST
        description: Search for multiple items at once
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: en-search-token
      path: /en/search/token
      operations:
      - name: searchbytoken
        method: GET
        description: Search for items using a search token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: searchbytokenpost
        method: POST
        description: Search for items using a search token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: arrow-electronics-rest
    port: 8080
    description: REST adapter for Arrow Electronics ItemService API. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/en/lookup/manufacturer
      name: en-lookup-manufacturer
      description: REST surface for en-lookup-manufacturer.
      operations:
      - method: GET
        name: lookupmanufacturer
        description: Manufacturer lookup
        call: arrow-electronics.lookupmanufacturer
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: lookupmanufacturerpost
        description: Manufacturer lookup
        call: arrow-electronics.lookupmanufacturerpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/en/lookup/taxonomy
      name: en-lookup-taxonomy
      description: REST surface for en-lookup-taxonomy.
      operations:
      - method: GET
        name: lookuptaxonomy
        description: Taxonomy lookup (deprecated)
        call: arrow-electronics.lookuptaxonomy
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/en/search/list
      name: en-search-list
      description: REST surface for en-search-list.
      operations:
      - method: GET
        name: searchlist
        description: Search for multiple items at once
        call: arrow-electronics.searchlist
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: searchlistpost
        description: Search for multiple items at once
        call: arrow-electronics.searchlistpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/en/search/token
      name: en-search-token
      description: REST surface for en-search-token.
      operations:
      - method: GET
        name: searchbytoken
        description: Search for items using a search token
        call: arrow-electronics.searchbytoken
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: searchbytokenpost
        description: Search for items using a search token
        call: arrow-electronics.searchbytokenpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: arrow-electronics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Arrow Electronics ItemService API. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: manufacturer-lookup
      description: Manufacturer lookup
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: arrow-electronics.lookupmanufacturer
      outputParameters:
      - type: object
        mapping: $.
    - name: manufacturer-lookup-2
      description: Manufacturer lookup
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: arrow-electronics.lookupmanufacturerpost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: taxonomy-lookup-deprecated
      description: Taxonomy lookup (deprecated)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: arrow-electronics.lookuptaxonomy
      outputParameters:
      - type: object
        mapping: $.
    - name: search-multiple-items-once
      description: Search for multiple items at once
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: arrow-electronics.searchlist
      outputParameters:
      - type: object
        mapping: $.
    - name: search-multiple-items-once-2
      description: Search for multiple items at once
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: arrow-electronics.searchlistpost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: search-items-using-search-token
      description: Search for items using a search token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: arrow-electronics.searchbytoken
      outputParameters:
      - type: object
        mapping: $.
    - name: search-items-using-search-token-2
      description: Search for items using a search token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: arrow-electronics.searchbytokenpost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
