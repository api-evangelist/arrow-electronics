description: >-
  Arrow Electronics is a global provider of products, services, and solutions to
  industrial and commercial users of electronic components and enterprise computing
  solutions. With over 2,200 suppliers and more than 200,000 customers worldwide,
  Arrow serves as a vital link in the technology supply chain, enabling the design,
  manufacture, and operation of electronic components. Arrow provides REST APIs for
  pricing and availability lookups, order placement, and supply chain automation,
  enabling distributors, OEMs, and procurement teams to integrate electronic
  component sourcing directly into their systems.
apis:
  - aid: arrow-electronics:pricing-availability-api
    name: Arrow Electronics Pricing and Availability API
    description: >-
      The Arrow Electronics Pricing and Availability API enables programmatic
      search for electronic components, retrieval of real-time pricing data,
      and inventory availability across Arrow's global inventory pools including
      ACNA/NAC, VERICAL, EUROPE, ASIA, AEP, C1S, PSG, and RFPD. Returns results
      in JSON or XML format.
    humanURL: https://developers.arrow.com/api/index.php/site/page?view=Itemservice
    baseURL: https://api.arrow.com/itemservice/v4
    tags:
      - Pricing
      - Availability
      - Electronics
      - Components
      - Inventory
    properties:
      - type: Documentation
        url: https://developers.arrow.com/api/index.php/site/page?view=Itemservice
      - type: Authentication
        url: https://developers.arrow.com/api/index.php/site/page?view=gettingStarted
  - aid: arrow-electronics:order-api
    name: Arrow Electronics Order API
    description: >-
      The Arrow Electronics Order API enables automated order placement for
      electronic components at Arrow.com and Verical.com, and allows programmatic
      retrieval of order status information for existing orders. Requires SHA-256
      encoded credentials and a Credit account.
    humanURL: https://developers.arrow.com/api/index.php/site/page?view=orderApi
    baseURL: https://api.arrow.com
    tags:
      - Orders
      - Procurement
      - E-Commerce
      - Supply Chain
    properties:
      - type: Documentation
        url: https://developers.arrow.com/api/index.php/site/page?view=orderApi
      - type: Authentication
        url: https://developers.arrow.com/api/index.php/site/page?view=gettingStarted
