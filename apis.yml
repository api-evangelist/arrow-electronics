  - type: Features
    data:
      - name: Global Inventory Search
        description: >-
          Search across up to 8 global inventory pools simultaneously including
          Arrow NAC, Verical, European, Asian, and specialty component inventories.
      - name: Real-Time Pricing
        description: >-
          Retrieve current pricing data for electronic components including
          quantity breaks, lead times, and packaging options.
      - name: Automated Order Placement
        description: >-
          Place orders programmatically for components at Arrow.com and
          Verical.com without manual web interaction, enabling supply chain
          automation.
      - name: Order Status Tracking
        description: >-
          Retrieve status information for existing orders to track fulfillment
          and shipping progress programmatically.
      - name: Multi-Format Support
        description: >-
          APIs return data in JSON (default) and XML formats, with JSONP support
          for browser-based integrations.
  - type: UseCases
    data:
      - name: ERP Integration
        description: >-
          Manufacturers and distributors integrate Arrow's Pricing and Availability
          API with their ERP systems (SAP, Oracle, etc.) to automate component
          sourcing and procurement workflows.
      - name: Bill of Materials Pricing
        description: >-
          Design engineers use the API to retrieve bulk pricing for entire Bills
          of Materials during product cost estimation and component selection.
      - name: Automated Procurement
        description: >-
          Procurement systems use the Order API to automatically replenish
          component inventory when stock reaches reorder thresholds.
      - name: Supply Chain Visibility
        description: >-
          Operations teams use availability data across multiple inventory pools
          to manage component risk and identify alternative sourcing options.
  - type: Integrations
    data:
      - name: Verical
        description: >-
          Arrow's Verical marketplace for independent distribution is accessible
          via the same API infrastructure, extending component sourcing to the
          spot market.
      - name: Arrow Enterprise Computing Solutions
        description: >-
          Integration with Arrow's enterprise computing division for server,
          storage, and cloud component procurement alongside electronic components.
